<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 260" width="100%" height="100%">
  <defs>
    <style>
      .logo-text {
        font-family: 'Times New Roman', Times, serif;
        font-size: 130px;
        fill: #FFFFFF;
        letter-spacing: 4px;
      }
      .logo-a {
        font-family: 'Times New Roman', Times, serif;
        font-size: 170px;
        fill: #FFFFFF;
      }
      .logo-subtext {
        font-family: 'Arial', sans-serif;
